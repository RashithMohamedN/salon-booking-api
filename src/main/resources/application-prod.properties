# Production database (Railway MySQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS ? your actual deployed frontend URL
app.cors.allowed-origins=${FRONTEND_URL}

# Business info
app.business.name=${BUSINESS_NAME}
app.business.phone=${BUSINESS_PHONE}
app.business.whatsapp=${BUSINESS_WHATSAPP}
app.business.address=${BUSINESS_ADDRESS}